<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Binexia</title><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0e1a;--m:#c8a000;--a:#ffd700;--g:#00e600;--r:#ff2200}body{font-family:system-ui,sans-serif;background:var(--bg);color:#fff;height:100vh;overflow:hidden}#apage{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,215,0,.08),transparent),var(--bg)}.abox{width:100%;max-width:400px;background:linear-gradient(180deg,#12192e,#0a0e1a);border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.6)}.logo{text-align:center;font-size:26px;font-weight:900;margin-bottom:20px}.logo span{color:var(--a)}.tabs{display:flex;border:1px solid rgba(255,215,0,.2);border-radius:10px;overflow:hidden;margin-bottom:20px}.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:900;transition:.2s;background:transparent;border:0;color:var(--m)}.tab.act{background:rgba(255,215,0,.15);color:#fff}.field{margin-bottom:14px}.field label{display:block;font-size:11px;font-weight:900;color:var(--m);margin-bottom:6px}input[type=email],input[type=password]{width:100%;padding:11px 14px;background:rgba(13,16,32,.8);border:1px solid rgba(255,215,0,.2);border-radius:10px;color:#fff;font-size:13px;outline:0;transition:.2s}input:focus{border-color:rgba(255,215,0,.6);box-shadow:0 0 0 3px rgba(255,215,0,.08)}input::placeholder{color:#555}.agree{display:flex;gap:8px;align-items:flex-start;font-size:11px;color:var(--m);line-height:1.6;margin-bottom:12px}input[type=checkbox]{margin-top:2px;accent-color:var(--a);min-width:14px}.sbtn{width:100%;padding:13px;background:linear-gradient(135deg,#ffd700,#c8a000);border:0;border-radius:10px;color:#0a0e1a;font-size:14px;font-weight:950;cursor:pointer;transition:.2s}.sbtn:hover{filter:brightness(1.08)}.sm{margin-top:12px;padding:10px;border-radius:10px;font-size:12px;text-align:center;display:none;font-weight:900}.sm.e{display:block;background:rgba(255,34,0,.12);border:1px solid rgba(255,34,0,.3);color:#ffb3b3}.sm.o{display:block;background:rgba(0,230,0,.1);border:1px solid rgba(0,230,0,.25);color:#c9ffe0}#dpage{display:none;flex-direction:column;height:100vh}.tb{height:50px;background:rgba(10,14,26,.96);border-bottom:1px solid rgba(255,215,0,.2);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;overflow:hidden}.dl{font-size:15px;font-weight:900;white-space:nowrap}.dl span{color:var(--a)}.asel{display:flex;gap:5px;overflow-x:auto;flex:1;scrollbar-width:none}.asel::-webkit-scrollbar{display:none}.ab{flex:0 0 auto;padding:4px 8px;background:rgba(13,16,32,.7);border:1px solid rgba(255,215,0,.2);border-radius:7px;color:var(--m);font-size:10px;font-weight:900;cursor:pointer;transition:.2s;white-space:nowrap}.ab.act{background:rgba(255,215,0,.15);color:#fff;border-color:rgba(255,215,0,.5)}.pi{display:flex;gap:8px;align-items:center}.cp{font-size:15px;font-weight:950}.cc{font-size:11px;font-weight:900}.ue{font-size:10px;color:var(--m);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.lb{padding:4px 9px;background:transparent;border:1px solid rgba(255,215,0,.3);border-radius:7px;color:var(--m);font-size:10px;font-weight:900;cursor:pointer}.lb:hover{color:#fff}.tkbar{height:30px;background:rgba(13,16,32,.9);border-bottom:1px solid rgba(255,215,0,.1);overflow:hidden;position:relative;flex-shrink:0}.tki{display:flex;position:absolute;animation:tk 32s linear infinite;white-space:nowrap}@keyframes tk{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}.tit{padding:0 10px;height:30px;display:inline-flex;align-items:center;gap:5px;border-right:1px solid rgba(255,215,0,.07);font-size:10px}.tn{font-weight:900;color:rgba(200,160,0,.8)}.tv{font-weight:1000;color:#fff}.tc{font-weight:900}.tc.u{color:var(--g)}.tc.d{color:var(--r)}.cw{flex:1;position:relative;overflow:hidden}canvas{display:block;width:100%;height:100%;cursor:crosshair}.chi{position:absolute;background:rgba(10,14,26,.92);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:6px 10px;font-size:10px;color:#fff;pointer-events:none;display:none;z-index:10;white-space:nowrap}.chi span{color:var(--m);font-weight:900;margin-right:2px}.ldg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--m);font-weight:900;background:var(--bg)}.ibtns{display:flex;gap:4px;align-items:center;flex-shrink:0}.ib{background:transparent;border:1px solid rgba(255,215,0,.3);border-radius:7px;color:var(--m);cursor:pointer;padding:5px 7px;font-size:13px;display:flex;align-items:center;transition:.2s}.ib:hover{color:#fff;border-color:rgba(255,215,0,.7);background:rgba(255,215,0,.08)}.gpov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none;backdrop-filter:blur(2px)}.gpov.on{display:block}.gp{position:fixed;top:0;right:-300px;width:290px;height:100vh;background:linear-gradient(180deg,#12192e,#0a0e1a);border-left:1px solid rgba(255,215,0,.3);z-index:100;transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}.gp.on{right:0}.gph{padding:14px 12px 12px;border-bottom:1px solid rgba(255,215,0,.18);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.gph h3{font-size:13px;color:var(--a);font-weight:900;display:flex;align-items:center;gap:6px}.gcl{background:transparent;border:0;color:var(--m);cursor:pointer;font-size:18px;line-height:1;padding:2px}.gcl:hover{color:#fff}.gupw{padding:10px 12px;border-bottom:1px solid rgba(255,215,0,.1);flex-shrink:0}.gub{width:100%;padding:10px;background:linear-gradient(135deg,#ffd700,#c8a000);border:0;border-radius:8px;color:#0a0e1a;font-size:12px;font-weight:950;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s}.gub:hover{filter:brightness(1.1)}.gub:disabled{opacity:.6;cursor:wait}.ggrid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:7px;scrollbar-width:thin;scrollbar-color:rgba(255,215,0,.2) transparent}.ggrid::-webkit-scrollbar{width:4px}.ggrid::-webkit-scrollbar-thumb{background:rgba(255,215,0,.2);border-radius:2px}.gmt{grid-column:1/-1;text-align:center;color:var(--m);font-size:11px;padding:30px 10px;line-height:2}.gic{display:block;font-size:24px;margin-bottom:6px}.gim{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,215,0,.15);position:relative;background:#0d1020;transition:.2s}.gim:hover{border-color:rgba(255,215,0,.5);transform:scale(1.02)}.gim img{width:100%;height:100%;object-fit:cover}.gim .gts{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:4px 5px 3px;font-size:8px;color:rgba(255,215,0,.7);text-align:center}.gpst{padding:6px 12px;font-size:10px;color:var(--m);text-align:center;flex-shrink:0;border-top:1px solid rgba(255,215,0,.1)}.gpr{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid rgba(255,215,0,.1);flex-shrink:0}.gav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#c8a000);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}.gei{font-size:10px;color:rgba(255,255,255,.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ulp{position:fixed;inset:0;background:rgba(10,14,26,.85);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px}.ulp.on{display:flex}.ulpb{width:220px;height:6px;background:rgba(255,215,0,.15);border-radius:3px;overflow:hidden}.ulpf{height:100%;background:linear-gradient(90deg,#ffd700,#c8a000);border-radius:3px;transition:width .3s;width:0%}.ulpt{font-size:12px;color:var(--m);font-weight:900}</style></head><body>
<div id="apage"><div class="abox"><div class="logo">Bi<span>nexia</span></div><div class="tabs"><button class="tab act" id="tl" onclick="sw('l')">تسجيل الدخول</button><button class="tab" id="ts" onclick="sw('s')">إنشاء حساب</button></div><div id="lf"><div class="field"><label>البريد الإلكتروني</label><input type="email" id="le" placeholder="you@example.com"></div><div class="field"><label>كلمة المرور</label><input type="password" id="lp" placeholder="••••••••"></div><button class="sbtn" onclick="doL()">دخول</button></div><div id="sf" style="display:none"><div class="field"><label>البريد الإلكتروني</label><input type="email" id="se" placeholder="you@example.com"></div><div class="field"><label>كلمة المرور</label><input type="password" id="sp" placeholder="••••••••"></div><div class="agree"><input type="checkbox" id="sa"><span>أؤكد أنني فوق 18 عاماً وأقبل شروط الخدمة</span></div><div class="agree"><input type="checkbox" id="st"><span>لست مواطناً أو مقيماً في الولايات المتحدة</span></div><button class="sbtn" onclick="doS()">إنشاء حساب</button></div><div class="sm" id="msg"></div></div></div>

<script type="module">
import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SB=createClient('https://ybpohyvkdjegyozxfset.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlicG9oeXZrZGplZ3lvenhmc2V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTQwMTgsImV4cCI6MjA4ODI3MDAxOH0.Mp7FmHUxlgF8zmnlrXxvWMKHvzNuFmeS5KFs4Y7nnbE',{auth:{persistSession:true,autoRefreshToken:true}});
const $=id=>document.getElementById(id);
let inited=false,cUsr=null;
(async()=>{const{data:{session}}=await SB.auth.getSession();if(session?.user)showD(session.user)})();
SB.auth.onAuthStateChange((_,s)=>{if(s?.user)showD(s.user);else if(!s){$('dpage').style.display='none';$('apage').style.display='flex';inited=false;cUsr=null}});
const sm=(m,t)=>{const e=$('msg');e.textContent=m;e.className='sm '+t};
window.sw=m=>{const l=m==='l';$('tl').className='tab'+(l?' act':'');$('ts').className='tab'+(!l?' act':'');$('lf').style.display=l?'block':'none';$('sf').style.display=l?'none':'block'};
window.doL=async()=>{const{error}=await SB.auth.signInWithPassword({email:$('le').value.trim(),password:$('lp').value});error?sm(error.message,'e'):sm('تم الدخول ✓','o')};
window.doS=async()=>{if(!$('sa').checked||!$('st').checked)return sm('وافق على الشروط أولاً','e');const{error}=await SB.auth.signUp({email:$('se').value.trim(),password:$('sp').value});error?sm(error.message,'e'):sm('تم التسجيل ✓ راجع بريدك','o')};
window.doOut=async()=>{await SB.auth.signOut()};
function showD(u){if(inited)return;inited=true;cUsr=u;$('apage').style.display='none';$('dpage').style.display='flex';$('ue').textContent=u.email;const n=u.email.split('@')[0];$('gpn').textContent=n;$('gpe').textContent=u.email;initD()}
/* ===== GALLERY ===== */
window.openG=async function(){$('gpov').classList.add('on');$('gp').classList.add('on');await loadImgs()};
window.closeG=function(){$('gpov').classList.remove('on');$('gp').classList.remove('on')};
window.onFile=async function(inp){if(!inp.files[0])return;const file=inp.files[0];if(!file.type.startsWith('image/')){alert('يرجى اختيار صورة فقط');return}inp.value='';await upImg(file)};
async function upImg(file){
 const ulp=$('ulp'),ulpf=$('ulpf'),ulpt=$('ulpt'),gub=$('gub');
 ulp.classList.add('on');ulpf.style.width='0%';ulpt.textContent='جاري رفع الصورة...';gub.disabled=true;
 try{
  const ext=file.name.split('.').pop().toLowerCase(),fname=`${Date.now()}.${ext}`,path=`${cUsr.id}/${fname}`;
  ulpf.style.width='30%';
  const{error}=await SB.storage.from('imgs').upload(path,file,{upsert:true,contentType:file.type});
  ulpf.style.width='80%';
  if(error){ulp.classList.remove('on');gub.disabled=false;alert('خطأ: '+error.message);return}
  ulpf.style.width='100%';ulpt.textContent='تم الرفع ✓';
  await new Promise(r=>setTimeout(r,600));
  ulp.classList.remove('on');gub.disabled=false;
  if(!$('gp').classList.contains('on')){$('gpov').classList.add('on');$('gp').classList.add('on')}
  await loadImgs();
 }catch(e){ulp.classList.remove('on');gub.disabled=false;alert('حدث خطأ أثناء الرفع')}
}
async function loadImgs(){
 const grid=$('ggrid'),st=$('gpst');
 grid.innerHTML='<div class="gmt"><span class="gic">⏳</span>جاري التحميل...</div>';
 const{data,error}=await SB.storage.from('imgs').list(cUsr.id,{sortBy:{column:'created_at',order:'desc'},limit:100});
 if(error||!data){grid.innerHTML='<div class="gmt"><span class="gic">⚠️</span>تعذر تحميل الصور<br><small style="font-size:9px;opacity:.6">تأكد من إنشاء bucket باسم imgs</small></div>';st.textContent='';return}
 const imgs=data.filter(f=>f.name&&!f.name.startsWith('.'));
 st.textContent=imgs.length?`${imgs.length} صورة محفوظة`:'لا توجد صور بعد';
 if(!imgs.length){grid.innerHTML='<div class="gmt"><span class="gic">🖼️</span>لا توجد صور بعد<br>اضغط رفع لإضافة صورة</div>';return}
 grid.innerHTML=imgs.map(f=>{
  const{data:{publicUrl}}=SB.storage.from('imgs').getPublicUrl(`${cUsr.id}/${f.name}`);
  const d=new Date(f.created_at||f.updated_at||Date.now()),ts=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return`<div class="gim" onclick="viewImg('${publicUrl}')"><img src="${publicUrl}" loading="lazy" onerror="this.parentElement.style.opacity='.4'"><div class="gts">${ts}</div></div>`;
 }).join('');
}
window.viewImg=function(url){const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;cursor:zoom-out';ov.onclick=()=>ov.remove();const img=document.createElement('img');img.src=url;img.style.cssText='max-width:92vw;max-height:92vh;border-radius:10px;border:1px solid rgba(255,215,0,.3)';ov.appendChild(img);document.body.appendChild(ov)};
/* ===== DASHBOARD ===== */
const A=[{s:'BTC/USDT',ws:'btcusdt',p:67000,d:1},{s:'ETH/USDT',ws:'ethusdt',p:3200,d:2},{s:'BNB/USDT',ws:'bnbusdt',p:580,d:2},{s:'SOL/USDT',ws:'solusdt',p:180,d:2},{s:'XRP/USDT',ws:'xrpusdt',p:.52,d:4},{s:'EUR/USD',ws:null,p:1.0842,d:4},{s:'GBP/USD',ws:null,p:1.2634,d:4},{s:'XAU/USD',ws:null,p:2312,d:2},{s:'USD/EGP',ws:null,p:48.22,d:2}];
window.A=A;
let ca=A[0],cs=[],wsK=null,wsTk=null,offX=0,zoom=10,dX=0,dO=0,drag=false,mX=-1,mY=-1;
const cv=$('cv'),cx=cv.getContext('2d'),cw=$('cw');
function initD(){bSel();bTick();rz();window.addEventListener('resize',rz);setupEv();selA(ca);startTW()}
function bSel(){$('asel').innerHTML=A.map((a,i)=>`<button class="ab${a===ca?' act':''}" onclick="selA(A[${i}])">${a.s}</button>`).join('')}
function f(n,d){return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
function bTick(){const mk=()=>A.map(a=>`<span class="tit"><span class="tn">${a.s}</span><span class="tv" id="tv${a.s.replace('/','')}">${f(a.p,a.d)}</span><span class="tc u" id="tc${a.s.replace('/','')}"}>+0.00%</span></span>`).join('');$('tki').innerHTML=mk()+mk()}
function startTW(){if(wsTk)wsTk.close();const streams=A.filter(a=>a.ws).map(a=>a.ws+'@miniTicker').join('/');wsTk=new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);wsTk.onmessage=e=>{const d=JSON.parse(e.data).data;if(!d)return;const as=A.find(a=>a.ws&&a.ws===d.s.toLowerCase());if(!as)return;const p=+d.c,ch=(p-+d.o)/+d.o*100;as.p=p;const k=as.s.replace('/',''),tv=$('tv'+k),tc=$('tc'+k);if(tv)tv.textContent=f(p,as.d);if(tc){tc.textContent=(ch>=0?'+':'')+ch.toFixed(2)+'%';tc.className='tc '+(ch>=0?'u':'d')}if(as===ca)upP(p)}}
window.selA=function(a){ca=a;bSel();cs=[];offX=0;if(wsK){try{wsK.close()}catch(e){}wsK=null}$('ldg').style.display='flex';a.ws?loadC(a):loadF(a)}
function loadC(a){fetch(`https://api.binance.com/api/v3/klines?symbol=${a.ws.toUpperCase()}&interval=1m&limit=300`).then(r=>r.json()).then(d=>{cs=d.map(k=>({t:+k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4]}));$('ldg').style.display='none';draw();upP(cs[cs.length-1]?.c||a.p);skWS(a)}).catch(()=>{cs=genC(a.p,200);$('ldg').style.display='none';draw()})}
function skWS(a){if(wsK)try{wsK.close()}catch(e){}wsK=new WebSocket(`wss://stream.binance.com:9443/ws/${a.ws}@kline_1m`);wsK.onmessage=e=>{const k=JSON.parse(e.data).k;if(!k)return;const nd={t:k.t,o:+k.o,h:+k.h,l:+k.l,c:+k.c};const last=cs[cs.length-1];if(last&&last.t===nd.t)cs[cs.length-1]=nd;else cs.push(nd);if(cs.length>500)cs.shift();draw();upP(nd.c)}}
function loadF(a){cs=genC(a.p,200);$('ldg').style.display='none';draw();upP(cs[cs.length-1].c);let lc=cs[cs.length-1].c;const id=setInterval(()=>{if(ca!==a){clearInterval(id);return}const v=a.p*.00018,ch=(Math.random()-.495)*v;lc+=ch;const last=cs[cs.length-1],now=Date.now();if(now-last.t>60000){cs.push({t:now,o:lc,h:lc,l:lc,c:lc});if(cs.length>500)cs.shift()}else{last.c=lc;last.h=Math.max(last.h,lc);last.l=Math.min(last.l,lc)}draw();upP(lc)},500);wsK={close:()=>clearInterval(id)}}
function genC(base,n){const r=[],now=Date.now();let p=base;for(let i=n;i>=0;i--){const v=base*.0012,o=p,ch=(Math.random()-.5)*v,c=o+ch,h=Math.max(o,c)+Math.random()*v*.4,l=Math.min(o,c)-Math.random()*v*.4;r.push({t:now-i*60000,o,h,l,c});p=c}return r}
function upP(price){if(!cs.length)return;const first=cs[0].c,chg=(price-first)/first*100;$('cp').textContent=f(price,ca.d);const ce=$('cc');ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';ce.style.color=chg>=0?'var(--g)':'var(--r)'}
const P={t:15,r:78,b:24,l:4};
function rz(){cv.width=cw.offsetWidth;cv.height=cw.offsetHeight;draw()}
function draw(){
 if(!cs.length)return;
 const W=cv.width,H=cv.height,cW=W-P.l-P.r,cH=H-P.t-P.b;
 cx.fillStyle='#0a0e1a';cx.fillRect(0,0,W,H);
 const cw2=Math.max(2,zoom),gap=Math.max(1,Math.round(cw2*.2)),step=cw2+gap;
 const vis=Math.floor(cW/step)+2,tot=cs.length;
 const maxOff=Math.max(0,(tot-vis)*step),off=Math.max(0,Math.min(offX,maxOff));
 const si=Math.max(0,Math.floor(off/step)),ei=Math.min(tot-1,si+vis);
 const vcs=cs.slice(si,ei+1);if(!vcs.length)return;
 let mn=Infinity,mx=-Infinity;vcs.forEach(c=>{mn=Math.min(mn,c.l);mx=Math.max(mx,c.h)});
 const rng=mx-mn||1,pad=rng*.05,lo=mn-pad,hi=mx+pad;
 const yS=v=>P.t+cH-(v-lo)/(hi-lo)*cH,xP=i=>P.l+i*step-(off%step);
 cx.strokeStyle='rgba(255,215,0,.07)';cx.lineWidth=1;
 for(let i=0;i<=4;i++){const y=P.t+cH/4*i;cx.beginPath();cx.moveTo(P.l,y);cx.lineTo(W-P.r,y);cx.stroke();cx.fillStyle='rgba(200,160,0,.55)';cx.font='9px system-ui';cx.textAlign='left';cx.fillText(f(hi-(hi-lo)/4*i,ca.d),W-P.r+4,y+3)}
 vcs.forEach((c,i)=>{const x=xP(i)+P.l,up=c.c>=c.o,col=up?'#00e600':'#ff2200';cx.strokeStyle=col;cx.lineWidth=1;cx.beginPath();cx.moveTo(x+cw2/2,yS(c.h));cx.lineTo(x+cw2/2,yS(c.l));cx.stroke();cx.fillStyle=col;const bT=Math.min(yS(c.o),yS(c.c)),bH=Math.max(1,Math.abs(yS(c.c)-yS(c.o)));cx.fillRect(x,bT,cw2,bH)});
 const lp=cs[cs.length-1]?.c;
 if(lp){const ly=yS(lp);cx.strokeStyle='rgba(255,215,0,.45)';cx.lineWidth=1;cx.setLineDash([4,3]);cx.beginPath();cx.moveTo(P.l,ly);cx.lineTo(W-P.r,ly);cx.stroke();cx.setLineDash([]);cx.fillStyle='#ffd700';cx.fillRect(W-P.r,ly-9,P.r-2,18);cx.fillStyle='#0a0e1a';cx.font='bold 9px system-ui';cx.textAlign='center';cx.fillText(f(lp,ca.d),W-P.r+(P.r-2)/2,ly+3)}
 if(mX>P.l&&mX<W-P.r&&mY>P.t&&mY<H-P.b){cx.strokeStyle='rgba(255,215,0,.22)';cx.lineWidth=1;cx.setLineDash([4,4]);cx.beginPath();cx.moveTo(mX,P.t);cx.lineTo(mX,H-P.b);cx.stroke();cx.beginPath();cx.moveTo(P.l,mY);cx.lineTo(W-P.r,mY);cx.stroke();cx.setLineDash([]);const chP=lo+(1-(mY-P.t)/cH)*(hi-lo);cx.fillStyle='rgba(255,215,0,.65)';cx.fillRect(W-P.r,mY-9,P.r-2,18);cx.fillStyle='#0a0e1a';cx.font='bold 9px system-ui';cx.textAlign='center';cx.fillText(f(chP,ca.d),W-P.r+(P.r-2)/2,mY+3);const ci=Math.floor((mX-P.l+(off%step))/step)+si;if(cs[ci]){const c=cs[ci],chi=$('chi');chi.innerHTML=`<span>O</span>${f(c.o,ca.d)} <span>H</span>${f(c.h,ca.d)} <span>L</span>${f(c.l,ca.d)} <span>C</span>${f(c.c,ca.d)}`;chi.style.display='block';chi.style.left=Math.min(mX+10,W-200)+'px';chi.style.top=Math.max(P.t,Math.min(mY-24,H-44))+'px'}}else $('chi').style.display='none';
 cx.fillStyle='rgba(200,160,0,.4)';cx.font='8px system-ui';cx.textAlign='center';const ts=Math.max(1,Math.floor(vcs.length/7));vcs.forEach((c,i)=>{if(i%ts===0){const x=xP(i)+P.l+cw2/2,d=new Date(c.t);cx.fillText(`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,x,H-5)}})
}
function setupEv(){
 cv.addEventListener('mousedown',e=>{drag=true;dX=e.clientX;dO=offX});
 cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mX=e.clientX-r.left;mY=e.clientY-r.top;if(drag)offX=dO-(e.clientX-dX);draw()});
 cv.addEventListener('mouseup',()=>drag=false);
 cv.addEventListener('mouseleave',()=>{drag=false;mX=-1;mY=-1;draw()});
 cv.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(3,Math.min(60,zoom*(e.deltaY<0?1.15:.87)));draw()},{passive:false});
 let t0=0,t1=0;
 cv.addEventListener('touchstart',e=>{drag=true;dX=e.touches[0].clientX;dO=offX;if(e.touches.length===2){t0=e.touches[0].clientX;t1=e.touches[1].clientX}},{passive:true});
 cv.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===2){const d=Math.abs(e.touches[0].clientX-e.touches[1].clientX),pd=Math.abs(t0-t1);zoom=Math.max(3,Math.min(60,zoom*(d>pd?1.05:.95)));t0=e.touches[0].clientX;t1=e.touches[1].clientX}else offX=dO-(e.touches[0].clientX-dX);draw()},{passive:false});
 cv.addEventListener('touchend',()=>drag=false);
}
